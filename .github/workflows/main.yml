name: Check Website Update

on:
  push:
    branches:
      - main
      - master

jobs:
  check-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 💡 核心更新：引入 cloudscraper 依赖用来绕过五秒盾
          pip install requests beautifulsoup4 cloudscraper 

      - name: Run crawler script
        run: |
          # 💡 核心更新：使用 -u 参数强行开启实时日志刷新，方便排查
          python -u escp_crawler.py

      - name: Upload HTML Result
        uses: actions/upload-artifact@v4
        with:
          name: escp-crawler-result
          path: escp_auditors_simple.html
          retention-days: 7