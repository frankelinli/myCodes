name: Check Website Update

on:
  push:
    branches:
      - main
      - master

jobs:
  check-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run crawler script
        run: |
          python escp_crawler.py

      # 【核心新增】将生成的 HTML 文件上传为 GitHub 运行产物
      - name: Upload HTML Result
        uses: actions/upload-artifact@v4
        with:
          name: escp-crawler-result # 下载时压缩包的名字
          path: escp_auditors_simple.html # 你的爬虫生成的 HTML 文件路径
          retention-days: 7 # 在 GitHub 上保留 7 天，超期自动删除，不占空间