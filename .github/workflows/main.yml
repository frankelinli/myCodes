name: Simple Hello Action

on:
  push:
    branches:
      - main
      - master
  # 💡 增加这个配置，允许你在 GitHub 网页上通过点击按钮手动触发运行
  workflow_dispatch: 

jobs:
  say-hello:
    runs-on: ubuntu-latest
    steps:
      - name: Show Current Time
        run: |
          echo "==== 正在初始化极简测试工作流 ===="
          date

      - name: Print Welcome Message
        run: |
          echo "========================================="
          echo "  Hello! GitHub Action 运行成功！"
          echo "  当前系统：Ubuntu Latest"
          echo "  执行状态：完美，绝对没有卡死！"
          echo "========================================="