name: Check Website Update

on:
  push:
    branches:
      - main
      - master

jobs:
  check-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run crawler script
        # 如果你希望爬虫报错时流程直接停止（推荐），可以删掉下面这行 continue-on-error
        continue-on-error: true 
        run: |
          python escp_crawler.py
        working-directory: ${{ github.workspace }}

      # 【优化点】删除了原先的 Read HTML 步骤，直接在邮件插件里引用文件

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: 'ESCP自动爬虫已完成'
          to: wingxyq@qq.com
          from: ${{ secrets.MAIL_FROM }}
          # 纯文本备用内容
          body: |
            GitHub Action 已自动完成爬虫任务并生成最新数据。
            请查看邮件正文获取最新审核公司列表。
          # 【修改这里】直接通过 file:// 协议读取 HTML 文件，安全且支持大文件
          html_body: file://escp_auditors_simple.html