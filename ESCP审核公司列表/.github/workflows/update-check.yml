name: Check Website Update

on:
  push:
    branches:
      - main
      - master

jobs:
  check-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run crawler script
        run: |
          python escp_crawler.py
        working-directory: ${{ github.workspace }}
        continue-on-error: true

      - name: Read HTML for email
        id: read_html
        run: |
          echo "html<<EOF" >> $GITHUB_OUTPUT
          cat escp_auditors_simple.html >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: 'ESCP自动爬虫已完成'
          to: wingxyq@qq.com
          from: ${{ secrets.MAIL_FROM }}
          body: |
            GitHub Action 已自动完成爬虫任务并生成最新数据。
            请查看邮件正文获取最新审核公司列表。
          body_html: ${{ steps.read_html.outputs.html }}
        env:
          HTML_FILE: escp_auditors_simple.html